name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Non-gating safety net: main has no branch protection (the daily
# blog-posts.yml bot commits directly — documented exemption). This can't
# block a bad commit, but it emails within minutes if generate_cards.py
# breaks, instead of the README silently going stale.
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          # 3.12 to match the runtime blog-posts.yml actually runs the bot
          # with — CI should test the production interpreter, not a newer one.
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements*.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt -r scripts/requirements-dev.txt

      - name: Run tests
        run: pytest -q scripts

      - name: Bandit security scan
        run: bandit -q -ll scripts/generate_cards.py

      - name: Dependency audit (pip-audit)
        run: pip-audit -r scripts/requirements.txt -r scripts/requirements-dev.txt

  # Render-check every ```mermaid block in the repo's Markdown (the pipeline
  # diagram in scripts/README.md). Same non-gating safety-net role as `test`:
  # main has no branch protection (the bot commits directly), so this emails on
  # a broken diagram rather than blocking a merge. Digest-pinned mermaid-cli
  # container — no Node/Chrome on the runner; Docker is preinstalled.
  docs-render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Render-check Mermaid diagrams
        run: scripts/render-diagrams.sh
