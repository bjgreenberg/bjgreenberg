name: Update README — latest posts

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
  workflow_dispatch:       # allow manual trigger from Actions tab

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest blog posts from briangreenberg.net
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://briangreenberg.net/feed/"
          max_post_count: 5
          comment_tag_name: "BLOG-POST-LIST"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          commit_message: "chore: refresh latest blog post list"
          # title="$description" gives a hover excerpt tooltip; \n separates list items
          template: "- <a href=\"$url\" target=\"_blank\" rel=\"noopener noreferrer\" title=\"$description\">$title</a>\n"

      - name: Fetch latest Mastodon posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://infosec.exchange/@brian_greenberg.rss"
          max_post_count: 5
          comment_tag_name: "MASTODON-POST-LIST"
          gh_token: ${{ secrets.GITHUB_TOKEN }}
          commit_message: "chore: refresh latest Mastodon posts"
          # Mastodon RSS has no <title>; $description holds the toot text
          template: "- <a href=\"$url\" target=\"_blank\" rel=\"noopener noreferrer\">$description</a>\n"
          description_max_length: "140"
