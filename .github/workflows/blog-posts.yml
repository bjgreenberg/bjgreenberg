name: Update README — latest posts

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate post cards and refresh README
        env:
          # GH_TOKEN: optional fine-grained PAT repo secret (falls back to the
          # auto-injected GITHUB_TOKEN). Used for the GitHub Activity card's
          # contribution-calendar GraphQL query.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/generate_cards.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain README.md assets)" ]]; then
            git add README.md assets
            git commit -m "chore: refresh latest post cards"
            git push
          else
            echo "No changes."
          fi
